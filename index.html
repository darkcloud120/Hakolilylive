<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハコリリ 活動行事曆</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fc-event { cursor: pointer; padding: 2px 4px; border-radius: 4px; font-size: 0.85em; }
        .fc-event-auto { background-color: #ff69b4 !important; border: none !important; }
        .fc-event-manual { background-color: #6495ED !important; border: none !important; }
        .fc-day-today { background: #fff5f7 !important; }
    </style>
</head>
<body class="bg-rose-50 font-sans">
    <div class="max-w-5xl mx-auto p-4 md:p-8">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-pink-600">ハコリリ 非官方行事曆</h1>
            <p class="text-gray-500 mt-2">自動同步官網活動，支援手動情報新增</p>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 border border-pink-100">
            <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center">
                <span class="mr-2">📅</span> 手動新增資料 (貼至 manual_events.json)
            </h2>
            <div class="flex flex-wrap gap-4">
                <input type="text" id="m_title" placeholder="活動標題" class="flex-1 border p-2 rounded-lg outline-none focus:border-pink-400">
                <input type="date" id="m_date" class="border p-2 rounded-lg outline-none focus:border-pink-400">
                <button onclick="genJSON()" class="bg-pink-500 text-white px-6 py-2 rounded-lg hover:bg-pink-600">產生代碼</button>
            </div>
            <textarea id="m_out" class="hidden w-full mt-4 bg-gray-50 p-3 text-xs font-mono border rounded-lg h-24" readonly></textarea>
        </div>

        <div class="bg-white p-4 md:p-8 rounded-2xl shadow-xl border border-pink-50">
            <div id="calendar"></div>
        </div>
    </div>

    <script>
        function genJSON() {
            const t = document.getElementById('m_title').value;
            const d = document.getElementById('m_date').value;
            if(!t || !d) return alert("請填寫完整");
            const res = [{ "title": "⭐ " + t, "start": d, "allDay": true, "className": "fc-event-manual" }];
            const area = document.getElementById('m_out');
            area.value = JSON.stringify(res, null, 2);
            area.classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', function() {
            var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                height: 'auto',
                headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                eventSources: [
                    { url: 'events.json?v=' + Date.now() },
                    { url: 'manual_events.json?v=' + Date.now() }
                ],
                eventClick: function(info) {
                    if(info.event.url) { window.open(info.event.url, '_blank'); info.jsEvent.preventDefault(); }
                }
            });
            calendar.render();
        });
    </script>
</body>
</html>
