<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="icon" href="https://yt3.googleusercontent.com/sLrOQHzzr6YL4VHb3iOjB9lGPbZb775QaNgljZQQWu9Fw5AVwErgkt-GlKDWxOYtMWKT_QjoAA=s160-c-k-c0x00ffffff-no-rj" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ハコリリ活動行事曆</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --theme-primary: #0CF5C9;   
            --theme-bg: #f0f9f7;        
            --theme-text: #000000;      
            --card-bg: #ffffff;
            --border-color: #c9eadd;
            --kotoha-green: #43ED40;    
            --hanon-blue: #60adf5;      
            --list-day-bg: #f8fafc;
        }

        .dark-mode {
            --theme-bg: #0a0a0a;        
            --theme-text: #e5e7eb;      
            --card-bg: #1a1a1a;         
            --border-color: #333333;    
            --list-day-bg: #2d2d2d; 
        }

        html, body {
            margin: 0; padding: 0; height: 100dvh;
            background-color: var(--theme-bg);
            color: var(--theme-text);
            overflow: hidden;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        #calendar-container {
            height: calc(100dvh - 64px);
            padding: 12px 12px 24px 12px;
            box-sizing: border-box;
        }

        .fc {
            height: 100%;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            overflow: hidden;
            color: var(--theme-text);
        }

        /* 過去活動隱藏邏輯 */
        .event-past {
            background-color: var(--theme-primary) !important;
            border-color: var(--theme-primary) !important;
            color: #000000 !important;
            opacity: 0.7 !important;
        }

        /* 當啟動 hide-past 模式時，強制隱藏過去活動 */
        .hide-past .event-past { 
            display: none !important; 
        }

        /* 強制隱藏沒有活動顯示的日期橫條 (JS 會動態輔助此類名) */
        .fc-list-day.hidden-day {
            display: none !important;
        }

        .fc-list-day-cushion { background-color: var(--list-day-bg) !important; }
        .fc-list-day-text, .fc-list-day-side-text {
            color: var(--theme-text) !important;
            font-weight: bold !important;
            text-decoration: none !important;
        }

        .fc-daygrid-day-number, .fc-col-header-cell-cushion {
            text-decoration: none !important;
            color: var(--theme-text) !important;
            font-weight: 600;
        }

        .fc-theme-standard td, .fc-theme-standard th { border-color: var(--border-color) !important; }
        .fc-event-time { display: none !important; }
        .fc-toolbar-title { font-size: 0.9em !important; font-weight: 800; color: var(--theme-text) !important; }

        .fc-button {
            background-color: var(--card-bg) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--theme-text) !important;
            font-size: 0.7em !important;
        }

        .fc-button-active {
            background-color: var(--theme-primary) !important;
            border-color: var(--theme-primary) !important;
            color: #000 !important;
        }

        .fc-event {
            cursor: pointer !important;
            background-color: var(--theme-primary) !important;
            border: none !important;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            color: #000 !important;
        }

        .event-birthday { animation: pulse 2s infinite; color: #000 !important; }
        .event-kotoha { background-color: var(--kotoha-green) !important; border-color: var(--kotoha-green) !important; }
        .event-hanon { background-color: var(--hanon-blue) !important; border-color: var(--hanon-blue) !important; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .modal-overlay { background-color: rgba(0, 0, 0, 0.7); display: none; backdrop-filter: blur(4px); z-index: 2000; }
        .modal-overlay.active { display: flex; }
        .modal-body { background-color: var(--card-bg); border: 2px solid var(--border-color); color: var(--theme-text); }
    </style>
</head>
<body>

    <header class="h-16 flex items-center justify-between px-4 bg-[var(--card-bg)] shadow-sm border-b border-[var(--border-color)] relative z-10">
        <div class="flex items-center gap-3">
            <h1 class="text-sm md:text-base font-black text-emerald-800 dark:text-emerald-400 whitespace-nowrap">ハコリリ活動行事曆</h1>
            <nav class="flex items-center gap-2 border-l pl-2 border-[var(--border-color)]">
                <a href="https://x.com/kotohatakoyaki" target="_blank" class="text-blue-400 hover:opacity-70 transition">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M23.444 4.834c-.812.358-1.683.6-2.597.71a4.532 4.532 0 001.988-2.503 9.042 9.042 0 01-2.87 1.096 4.524 4.524 0 00-7.705 4.122 12.83 12.83 0 01-9.317-4.722 4.521 4.521 0 001.4 6.034 4.504 4.504 0 01-2.048-.565v.057a4.522 4.522 0 003.625 4.43 4.528 4.528 0 01-2.04.077 4.526 4.526 0 004.225 3.14A9.073 9.073 0 010 18.39a12.793 12.793 0 006.926 2.03c8.311 0 12.855-6.885 12.855-12.854 0-.196-.004-.39-.013-.585a9.184 9.184 0 002.256-2.333z"/></svg>
                </a>
                <a href="https://www.youtube.com/@%E3%81%93%E3%81%A8%E3%81%AF%E3%81%AE%E3%81%9F%E3%81%93%E7%84%BC%E3%81%8D/" target="_blank" class="text-red-500 hover:opacity-70 transition">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.376-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                </a>
            </nav>
        </div>
        
        <div class="flex items-center gap-1">
            <button id="toggle-past" onclick="togglePastEvents()" class="px-2 py-1.5 bg-[var(--theme-bg)] border border-[var(--border-color)] rounded-md text-[10px] font-bold text-emerald-700 dark:text-emerald-400 hover:opacity-80 transition mr-2">
                隱藏過去活動
            </button>
            <button onclick="toggleDarkMode()" class="text-gray-500 dark:text-yellow-400 p-1 hover:scale-110 transition">
                <span id="dark-icon">🌙</span>
            </button>
            <button onclick="toggleDrawer()" class="w-8 h-8 flex items-center justify-center text-xl text-gray-300 font-bold">+</button>
        </div>
    </header>

    <div id="calendar-container">
        <div id="calendar"></div>
    </div>

    <div id="modal" class="modal-overlay fixed inset-0 items-center justify-center p-4">
        <div class="modal-body rounded-2xl max-w-sm w-full p-6 shadow-2xl text-center">
            <h3 class="text-emerald-600 font-bold mb-3 text-[10px] tracking-widest uppercase">Detail</h3>
            <div id="modal-img-container" class="mb-4 hidden"><img id="modal-img" src="" class="w-full max-h-60 object-contain rounded-lg"></div>
            <p id="modal-title" class="font-bold text-base mb-6"></p>
            <div class="flex flex-col gap-2">
                <a id="modal-link" href="#" target="_blank" class="w-full bg-emerald-500 py-3 rounded-xl text-white font-bold">查看詳情</a>
                <button id="btn-gcal" class="w-full bg-[var(--card-bg)] border-2 border-[var(--border-color)] py-3 rounded-xl text-emerald-600 font-bold text-sm">加日曆</button>
                <button onclick="closeModal()" class="w-full py-2 text-gray-400 text-sm mt-1">關閉</button>
            </div>
        </div>
    </div>

    <div id="drawer" class="fixed bottom-0 left-0 right-0 bg-[var(--card-bg)] border-t border-[var(--border-color)] p-4 transform translate-y-full transition-transform duration-300 z-[1100]">
        <div class="max-w-md mx-auto">
            <div class="grid grid-cols-2 gap-2 mb-2">
                <input type="text" id="mt" placeholder="標題" class="border p-2 rounded-lg text-sm col-span-2 bg-[var(--theme-bg)] border-[var(--border-color)] text-[var(--theme-text)]">
                <input type="date" id="ms" class="border p-2 rounded-lg text-sm bg-[var(--theme-bg)] border-[var(--border-color)] text-[var(--theme-text)]">
                <input type="date" id="me" class="border p-2 rounded-lg text-sm bg-[var(--theme-bg)] border-[var(--border-color)] text-[var(--theme-text)]">
                <input type="text" id="mi" placeholder="圖片網址" class="border p-2 rounded-lg text-sm col-span-2 bg-[var(--theme-bg)] border-[var(--border-color)] text-[var(--theme-text)]">
                <input type="text" id="mu" placeholder="詳情網址" class="border p-2 rounded-lg text-sm col-span-2 bg-[var(--theme-bg)] border-[var(--border-color)] text-[var(--theme-text)]">
                <button onclick="genJSON()" class="bg-emerald-500 text-white p-2 rounded-lg font-bold col-span-2">生成</button>
            </div>
            <textarea id="mo" class="w-full hidden text-[10px] font-mono border p-2 h-20 bg-[var(--theme-bg)] text-[var(--theme-text)]" readonly></textarea>
        </div>
    </div>

    <script>
        let hidePast = false;
        let calendar;

        function toggleDrawer() { document.getElementById('drawer').classList.toggle('translate-y-0'); }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('dark-icon').innerText = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'dark') toggleDarkMode();

        // 🚀 關鍵修正：切換隱藏狀態時，觸發清單橫條更新
        function togglePastEvents() {
            hidePast = !hidePast;
            const container = document.getElementById('calendar-container');
            const btn = document.getElementById('toggle-past');
            if (hidePast) {
                container.classList.add('hide-past');
                btn.innerText = "顯示過去活動";
            } else {
                container.classList.remove('hide-past');
                btn.innerText = "隱藏過去活動";
            }
            updateListHeaders(); // 手動更新一次
        }

        // 🚀 關鍵修正：檢查 List 視圖中的日期橫條，如果其下方沒有可見活動，則隱藏該日期
        function updateListHeaders() {
            if (!hidePast) {
                document.querySelectorAll('.fc-list-day').forEach(el => el.classList.remove('hidden-day'));
                return;
            }
            // 延遲一小段時間確保渲染完成
            setTimeout(() => {
                const days = document.querySelectorAll('.fc-list-day');
                days.forEach(day => {
                    let next = day.nextElementSibling;
                    let hasVisibleEvent = false;
                    // 檢查直到下一個日期橫條前的所有活動
                    while (next && !next.classList.contains('fc-list-day')) {
                        if (next.classList.contains('fc-list-event') && !next.classList.contains('event-past')) {
                            hasVisibleEvent = true;
                            break;
                        }
                        next = next.nextElementSibling;
                    }
                    if (!hasVisibleEvent) {
                        day.classList.add('hidden-day');
                    } else {
                        day.classList.remove('hidden-day');
                    }
                });
            }, 10);
        }

        document.addEventListener('DOMContentLoaded', function() {
            const todayStr = new Date().toISOString().split('T')[0];
            const currentYear = new Date().getFullYear();
            
            const bdays = [];
            for(let i=0; i<3; i++){
                bdays.push({ title: "🐧 Hanon Birthday", start: `${currentYear+i}-03-06`, allDay: true, classNames: ["event-birthday", "event-hanon"], description: "Hanon 生日快樂！🐧" });
                bdays.push({ title: "🍀 Kotoha Birthday", start: `${currentYear+i}-06-10`, allDay: true, classNames: ["event-birthday", "event-kotoha"], description: "Kotoha 生日快樂！🍀" });
            }

            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                height: '100%',
                displayEventTime: false,
                nextDayThreshold: '00:00:00',
                dayCellContent: (arg) => arg.date.getDate(),
                headerToolbar: { left: 'prev,next', center: 'title', right: 'dayGridMonth,listYear' },
                buttonText: { dayGridMonth: 'month', listYear: 'list' },
                eventDataTransform: function(eventData) {
                    const compareDate = eventData.end || eventData.start;
                    if (compareDate < todayStr) {
                        eventData.classNames = (eventData.classNames || []);
                        eventData.classNames.push('event-past');
                    }
                    if (eventData.end && eventData.end !== eventData.start) eventData.allDay = true;
                    return eventData;
                },
                events: bdays,
                eventSources: [
                    { url: 'events.json?v=' + Date.now() },
                    { url: 'manual_events.json?v=' + Date.now() }
                ],
                eventClick: (info) => { info.jsEvent.preventDefault(); openModal(info.event); },
                // 🚀 關鍵修正：每次渲染視圖（包含翻頁）都要檢查
                didRender: () => { updateListHeaders(); }
            });
            calendar.render();

            const toolbarRight = document.querySelector('.fc-toolbar-chunk:last-child');
            const customBtn = document.getElementById('toggle-past');
            if (toolbarRight && customBtn) {
                const btnGroup = document.createElement('div');
                btnGroup.className = 'fc-button-group custom-btn-group mr-2';
                btnGroup.appendChild(customBtn);
                toolbarRight.prepend(btnGroup);
            }
        });

        function openModal(event) {
            const title = event.extendedProps.description || event.title;
            const img = event.extendedProps.image;
            document.getElementById('modal-title').innerText = title;
            const imgCont = document.getElementById('modal-img-container');
            const imgTag = document.getElementById('modal-img');
            if (img) { imgTag.src = img; imgCont.classList.remove('hidden'); } 
            else { imgCont.classList.add('hidden'); }
            const isBirthday = event.title.includes('Birthday');
            const linkBtn = document.getElementById('modal-link');
            linkBtn.style.display = isBirthday ? 'none' : 'block';
            linkBtn.href = event.url || "https://hakoniwalily.jp/news/";
            document.getElementById('btn-gcal').onclick = () => {
                const gUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${event.startStr.replace(/-/g,'')}/${(event.endStr||event.startStr).replace(/-/g,'')}`;
                window.open(gUrl, '_blank');
            };
            document.getElementById('modal').classList.add('active');
        }
        window.onclick = (e) => { if(e.target.classList.contains('modal-overlay')) closeModal(); }
        function genJSON() {
            const t = document.getElementById('mt').value, s = document.getElementById('ms').value, e = document.getElementById('me').value;
            const i = document.getElementById('mi').value, u = document.getElementById('mu').value;
            if(!t || !s) return;
            const eventObj = { "title": t, "start": s, "description": t, "allDay": true };
            if(e) eventObj.end = e;
            if(i) eventObj.image = i;
            if(u) eventObj.url = u;
            const out = document.getElementById('mo');
            out.value = JSON.stringify([eventObj], null, 2);
            out.classList.remove('hidden');
        }
    </script>
</body>
</html>
