<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハコリリ活動行事曆</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --fc-event-bg-color: #ff69b4; --fc-event-border-color: #ff69b4; }
        .fc-event { cursor: pointer; transition: opacity 0.2s; }
        .fc-event:hover { opacity: 0.8; }
    </style>
</head>
<body class="bg-pink-50 text-gray-800">

    <div class="container mx-auto p-4">
        <header class="text-center my-8">
            <h1 class="text-4xl font-bold text-pink-600">ハコリリ活動行事曆</h1>
            <p class="mt-2 text-gray-500">僅供參考，詳情以官網為主</p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-lg">
            <div id="calendar"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                events: Hakoday/events.json', // 讀取 GitHub 產生的 JSON
                eventClick: function(info) {
                    info.jsEvent.preventDefault();
                    if (info.event.url) {
                        window.open(info.event.url, "_blank");
                    }
                },
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,listMonth'
                }
            });
            calendar.render();
        });
    </script>
</body>
</html>
