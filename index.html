<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハコリリ活動行事曆</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --theme-primary: #00ced1;   
            --theme-bg: #e6f4f1;        
            --theme-text: #155e75;      
            --birthday-gold: #f59e0b;   
        }

        html, body {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--theme-bg);
            overflow: hidden;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        #calendar-container {
            height: calc(100vh - 64px);
            padding: 12px;
            box-sizing: border-box;
        }

        .fc {
            height: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 1px solid #b2ebf2;
            overflow: hidden;
        }

        .fc-event-time { display: none !important; }

        .fc-toolbar-title {
            font-size: 1.1em !important;
            font-weight: 800;
            color: var(--theme-text) !important;
        }

        .fc-button {
            background-color: #f0fdfa !important;
            border: 1px solid #99f6e4 !important;
            color: var(--theme-text) !important;
            font-weight: 600 !important;
            border-radius: 8px !important;
            font-size: 0.8em !important;
        }

        .fc-button-active {
            background-color: var(--theme-primary) !important;
            border-color: var(--theme-primary) !important;
            color: white !important;
        }

        .fc-event {
            cursor: pointer !important;
            background-color: var(--theme-primary) !important;
            border: none !important;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8em;
            margin: 1px 0;
        }

        .event-birthday {
            background-color: var(--birthday-gold) !important;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.6);
            display: none;
            backdrop-filter: blur(4px);
            z-index: 1000;
        }

        .modal-overlay.active { display: flex; }
    </style>
</head>
<body>

    <header class="h-16 flex items-center justify-between px-4 md:px-6 bg-white shadow-sm border-b border-cyan-100 relative z-10">
        <div class="flex items-center gap-3">
            <div class="flex gap-1">
                <span class="w-2.5 h-2.5 rounded-full bg-[#00CED1]"></span>
                <span class="w-2.5 h-2.5 rounded-full bg-[#98FB98]"></span>
            </div>
            <h1 class="text-base md:text-lg font-black text-cyan-700 tracking-tighter mr-2">ハコリリ活動行事曆</h1>
            
            <nav class="flex items-center gap-3 border-l pl-3 border-cyan-50">
                <a href="https://x.com/kotohatakoyaki" target="_blank" class="text-[11px] font-bold text-[#1DA1F2] hover:opacity-70 flex items-center gap-1 transition">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M23.444 4.834c-.812.358-1.683.6-2.597.71a4.532 4.532 0 001.988-2.503 9.042 9.042 0 01-2.87 1.096 4.524 4.524 0 00-7.705 4.122 12.83 12.83 0 01-9.317-4.722 4.521 4.521 0 001.4 6.034 4.504 4.504 0 01-2.048-.565v.057a4.522 4.522 0 003.625 4.43 4.528 4.528 0 01-2.04.077 4.526 4.526 0 004.225 3.14A9.073 9.073 0 010 18.39a12.793 12.793 0 006.926 2.03c8.311 0 12.855-6.885 12.855-12.854 0-.196-.004-.39-.013-.585a9.184 9.184 0 002.256-2.333z"/></svg>
                    <span>Twitter</span>
                </a>
                <a href="https://www.youtube.com/@%E3%81%93%E3%81%A8%E3%81%AF%E3%81%AE%E3%81%9F%E3%81%93%E7%84%BC%E3%81%8D" target="_blank" class="text-[11px] font-bold text-red-600 hover:opacity-70 flex items-center gap-1 transition">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.376-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    <span>YouTube</span>
                </a>
            </nav>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleDrawer()" class="w-8 h-8 flex items-center justify-center text-lg text-gray-200 hover:text-cyan-400 transition font-bold">+</button>
        </div>
    </header>

    <div id="calendar-container">
        <div id="calendar"></div>
    </div>

    <div id="modal" class="modal-overlay fixed inset-0 items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border-2 border-cyan-100 text-center relative">
            <h3 class="text-cyan-600 font-bold mb-3 text-xs uppercase tracking-widest">Activity Detail</h3>
            
            <div id="modal-img-container" class="mb-4 hidden">
                <img id="modal-img" src="" class="w-full max-h-60 object-contain rounded-lg bg-gray-50 border border-cyan-50 shadow-inner">
            </div>

            <p id="modal-title" class="text-gray-800 font-bold text-lg leading-relaxed mb-6"></p>
            
            <div class="flex flex-col gap-2">
                <a id="modal-link" href="#" target="_blank" class="w-full bg-cyan-500 py-3 rounded-xl text-white font-bold hover:bg-cyan-600 transition">查看活動詳情</a>
                
                <button id="btn-gcal" class="w-full bg-white border-2 border-cyan-100 py-3 rounded-xl text-cyan-600 font-bold hover:bg-cyan-50 transition flex items-center justify-center gap-2 text-sm">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 002 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM9 14H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2zm-8 4H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2z"/></svg>
                    加入我的 Google 日曆
                </button>
                <button onclick="closeModal()" class="w-full py-2 text-gray-400 text-sm font-medium mt-1">關閉</button>
            </div>
        </div>
    </div>

    <div id="drawer" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 transform translate-y-full transition-transform duration-300 z-[1100] shadow-inner">
        <div class="max-w-md mx-auto">
            <div class="grid grid-cols-2 gap-2 mb-2">
                <input type="text" id="mt" placeholder="活動標題" class="border p-2 rounded-lg text-sm col-span-2 focus:border-cyan-400 outline-none">
                <input type="date" id="ms" class="border p-2 rounded-lg text-sm" title="開始日期">
                <input type="date" id="me" class="border p-2 rounded-lg text-sm" title="結束日期 (跨日才填)">
                <input type="text" id="mi" placeholder="海報圖片網址 " class="border p-2 rounded-lg text-sm col-span-2 focus:border-cyan-400 outline-none">
                <input type="text" id="mu" placeholder="詳情連結網址 " class="border p-2 rounded-lg text-sm col-span-2 focus:border-cyan-400 outline-none">
                <button onclick="genJSON()" class="bg-cyan-500 text-white p-2 rounded-lg font-bold col-span-2 hover:bg-cyan-600 transition">生成</button>
            </div>
            <textarea id="mo" class="w-full hidden text-[10px] font-mono border p-2 h-24 bg-gray-50 mb-2 rounded" readonly></textarea>
            <p id="copy-tip" class="text-[10px] text-cyan-600 text-center hidden mb-2">生成成功！請複製內容並貼到 manual_events.json</p>
        </div>
    </div>

    <script>
        function toggleDrawer() { document.getElementById('drawer').classList.toggle('translate-y-0'); }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        
        function getGCalUrl(title, dateStr) {
            const date = dateStr.replace(/-/g, '').split('T')[0];
            return `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${date}/${date}&details=${encodeURIComponent('來自 ハコリリ活動行事曆')}`;
        }

        function openModal(event) {
            const title = event.extendedProps.description || event.title;
            const date = event.startStr;
            const img = event.extendedProps.image;
            const url = event.url || event.extendedProps.url; // 支援手動新增的 url 屬性
            const isBirthday = event.classNames && event.classNames.includes('event-birthday');
            
            document.getElementById('modal-title').innerText = title;
            
            const imgCont = document.getElementById('modal-img-container');
            const imgTag = document.getElementById('modal-img');
            if (img) {
                imgTag.src = img;
                imgCont.classList.remove('hidden');
            } else {
                imgCont.classList.add('hidden');
            }

            const linkBtn = document.getElementById('modal-link');
            if (isBirthday) {
                linkBtn.style.display = 'none';
            } else {
                linkBtn.style.display = 'block';
                // 優先使用資料中的 url，若無則跳官網新聞頁
                linkBtn.href = url || "https://hakoniwalily.jp/news/";
            }
            
            document.getElementById('btn-gcal').onclick = () => window.open(getGCalUrl(title, date), '_blank');
            document.getElementById('modal').classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const currentYear = new Date().getFullYear();
            const bdays = [];
            for(let i=0; i<5; i++){
                bdays.push({ title: "🎂 Hanon Birthday", start: `${currentYear+i}-03-06`, className: "event-birthday", description: "Hanon 生日快樂！🐧" });
                bdays.push({ title: "🎂 Kotoha Birthday", start: `${currentYear+i}-06-10`, className: "event-birthday", description: "Kotoha 生日快樂！🍀" });
            }

            var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                height: '100%',
                displayEventTime: false,
                headerToolbar: { left: 'prev,next', center: 'title', right: 'dayGridMonth,listYear' },
                buttonText: { month: '日曆', list: '清單' },
                events: bdays,
                eventSources: [
                    { url: 'events.json?v=' + Date.now() },
                    { url: 'manual_events.json?v=' + Date.now() }
                ],
                eventClick: function(info) {
                    info.jsEvent.preventDefault();
                    openModal(info.event);
                }
            });
            calendar.render();
        });

        window.onclick = function(e) { if(e.target.classList.contains('modal-overlay')) closeModal(); }

        function genJSON() {
            const t = document.getElementById('mt').value, s = document.getElementById('ms').value;
            const e = document.getElementById('me').value, i = document.getElementById('mi').value;
            const u = document.getElementById('mu').value;
            if(!t || !s) return;
            
            const eventObj = { "title": "⭐ "+t, "start": s, "description": t };
            if(e) eventObj.end = e;
            if(i) eventObj.image = i;
            if(u) eventObj.url = u; // 存入自定義網址
            
            const out = document.getElementById('mo');
            out.value = JSON.stringify([eventObj], null, 2);
            out.classList.remove('hidden');
            document.getElementById('copy-tip').classList.remove('hidden');
        }
    </script>
</body>
</html>
