<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハコリリ活動行事曆</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --theme-primary: #00ced1;   /* Hanon 亮藍綠 */
            --theme-secondary: #ccfbf1; /* 淡薄荷綠 */
            --theme-bg: #e6f4f1;        /* 質感底色 (稍微深且偏綠) */
            --theme-text: #155e75;      /* 深藍綠文字 */
        }

        html, body {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--theme-bg);
            overflow: hidden;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        /* 日曆容器佈局 */
        #calendar-container {
            height: calc(100vh - 64px);
            padding: 12px;
            box-sizing: border-box;
        }

        .fc {
            height: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 1px solid #b2ebf2;
            overflow: hidden;
        }

        /* 標題與按鈕美化 */
        .fc-toolbar-title {
            font-size: 1.2em !important;
            font-weight: 800;
            color: var(--theme-text) !important;
        }

        .fc-button {
            background-color: #f0fdfa !important;
            border: 1px solid #99f6e4 !important;
            color: var(--theme-text) !important;
            font-weight: 600 !important;
            border-radius: 8px !important;
        }

        .fc-button-active {
            background-color: var(--theme-primary) !important;
            border-color: var(--theme-primary) !important;
            color: white !important;
        }

        /* 活動條樣式 */
        .fc-event {
            cursor: pointer !important;
            background-color: var(--theme-primary) !important;
            border: none !important;
            padding: 3px 6px;
            border-radius: 6px;
            font-size: 0.8em;
            transition: transform 0.1s;
        }
        
        .fc-event:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        /* 彈窗毛玻璃效果 */
        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.6);
            display: none;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active { display: flex; }
    </style>
</head>
<body>

    <header class="h-16 flex items-center justify-between px-6 bg-white shadow-sm border-b border-cyan-100 relative z-10">
        <div class="flex items-center gap-3">
            <div class="flex gap-1">
                <span class="w-3 h-3 rounded-full bg-[#00CED1]"></span>
                <span class="w-3 h-3 rounded-full bg-[#98FB98]"></span>
            </div>
            <h1 class="text-lg md:text-xl font-black text-cyan-700 tracking-tighter">ハコリリ活動行事曆</h1>
            
            <nav class="flex items-center gap-4 ml-4 border-l pl-4 border-cyan-100">
                <a href="https://hakoniwalily.jp/news/" target="_blank" class="text-xs font-bold text-cyan-600 hover:text-cyan-400 flex items-center gap-1 transition">
                    <span class="hidden md:inline">新聞官網</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l4 4v10a2 2 0 01-2 2z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h5M7 12h8M7 16h8"></path></svg>
                </a>
                <a href="https://www.youtube.com/@%E3%81%93%E3%81%A8%E3%81%AF%E3%81%AE%E3%81%9F%E3%81%93%E7%84%BC%E3%81%8D" target="_blank" class="text-xs font-bold text-red-500 hover:text-red-400 flex items-center gap-1 transition">
                    <span class="hidden md:inline">作者頻道</span>
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                </a>
            </nav>
        </div>
        
        <button onclick="toggleDrawer()" class="text-[10px] text-gray-200 hover:text-cyan-300">Admin</button>
    </header>

    <div id="calendar-container">
        <div id="calendar"></div>
    </div>

    <div id="modal" class="modal-overlay fixed inset-0 z-[100] items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border-2 border-cyan-100 text-center scale-95 transition-transform duration-200 modal-content">
            <h3 class="text-cyan-600 font-bold mb-4 text-xs uppercase tracking-widest">Activity Detail</h3>
            <p id="modal-title" class="text-gray-800 font-bold text-lg leading-relaxed mb-6"></p>
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 py-3 rounded-xl text-gray-400 font-bold hover:bg-gray-200 transition">關閉</button>
                <a id="modal-link" href="#" target="_blank" class="flex-1 bg-cyan-500 py-3 rounded-xl text-white font-bold shadow-lg shadow-cyan-100 hover:bg-cyan-600 transition">前往官網</a>
            </div>
        </div>
    </div>

    <div id="drawer" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 transform translate-y-full transition-transform duration-300 z-50">
        <div class="max-w-md mx-auto">
            <div class="flex gap-2 mb-2">
                <input type="text" id="mt" placeholder="活動標題" class="border p-2 flex-1 rounded-lg text-sm">
                <input type="date" id="md" class="border p-2 rounded-lg text-sm">
                <button onclick="genJSON()" class="bg-cyan-500 text-white px-4 rounded-lg font-bold">生成</button>
            </div>
            <textarea id="mo" class="w-full hidden text-[10px] font-mono border p-2 h-16 bg-gray-50" readonly></textarea>
        </div>
    </div>

    <script>
        // UI 互動
        function toggleDrawer() { document.getElementById('drawer').classList.toggle('translate-y-0'); }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        
        function openModal(title, url) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-link').href = url || "#";
            document.getElementById('modal').classList.add('active');
        }

        function genJSON() {
            const t = document.getElementById('mt').value, d = document.getElementById('md').value;
            if(!t || !d) return;
            const res = [{ "title": "⭐ "+t, "start": d, "description": t, "className": "fc-event-manual" }];
            const out = document.getElementById('mo');
            out.value = JSON.stringify(res, null, 2);
            out.classList.remove('hidden');
        }

        // 初始化日曆
        document.addEventListener('DOMContentLoaded', function() {
            var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                height: '100%',
                headerToolbar: { 
                    left: 'prev,next', 
                    center: 'title', 
                    right: 'dayGridMonth,listYear' 
                },
                buttonText: { month: '日曆', list: '清單' },
                views: {
                    listYear: { buttonText: '清單', duration: { years: 1 } }
                },
                eventSources: [
                    { url: 'events.json?v=' + Date.now() },
                    { url: 'manual_events.json?v=' + Date.now() }
                ],
                eventClick: function(info) {
                    info.jsEvent.preventDefault();
                    openModal(info.event.extendedProps.description || info.event.title, info.event.url);
                }
            });
            calendar.render();
        });

        // 點擊空白處關閉
        document.getElementById('modal').addEventListener('click', function(e) {
            if(e.target === this) closeModal();
        });
    </script>
</body>
</html>
