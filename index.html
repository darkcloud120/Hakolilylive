<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハコリリ 活動行事曆</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #fffafb; overflow: hidden; }
        #calendar-container { height: calc(100vh - 64px); padding: 10px; box-sizing: border-box; }
        .fc-event { cursor: pointer !important; background-color: #ff69b4 !important; border: none !important; }
        .fc-toolbar-title { font-size: 1.2em !important; font-weight: bold; color: #db2777; }
        .modal-overlay { background: rgba(0,0,0,0.5); display: none; }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body class="font-sans">

    <header class="h-16 flex items-center justify-between px-6 bg-white shadow-sm border-b border-pink-100">
        <h1 class="text-xl font-black text-pink-600 tracking-tighter">ハコリリ 非官方行事曆</h1>
        <button onclick="toggleDrawer()" class="text-[10px] text-gray-200">Admin</button>
    </header>

    <div id="calendar-container">
        <div id="calendar" class="h-full bg-white rounded-xl shadow-lg"></div>
    </div>

    <div id="modal" class="modal-overlay fixed inset-0 z-[100] items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border-2 border-pink-100">
            <h3 class="text-pink-600 font-bold mb-2 text-sm uppercase tracking-widest">Activity Detail</h3>
            <p id="modal-title" class="text-gray-800 font-bold text-lg leading-relaxed mb-6"></p>
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 py-3 rounded-xl text-gray-400 font-bold">關閉</button>
                <a id="modal-link" href="#" target="_blank" class="flex-1 bg-pink-500 py-3 rounded-xl text-white text-center font-bold shadow-lg shadow-pink-200">開啟官網</a>
            </div>
        </div>
    </div>

    <div id="drawer" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 transform translate-y-full transition-transform z-50">
        <div class="max-w-md mx-auto flex gap-2">
            <input type="text" id="mt" placeholder="活動標題" class="border p-2 flex-1 rounded text-sm">
            <input type="date" id="md" class="border p-2 rounded text-sm">
            <button onclick="gen()" class="bg-pink-500 text-white px-4 rounded text-sm">生成代碼</button>
        </div>
        <textarea id="mo" class="w-full mt-2 hidden text-[10px] font-mono border p-2 h-16"></textarea>
    </div>

    <script>
        function toggleDrawer() { document.getElementById('drawer').classList.toggle('translate-y-0'); }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        function gen() {
            const t = document.getElementById('mt').value, d = document.getElementById('md').value;
            const res = [{ "title": "⭐ "+t, "start": d, "description": t }];
            document.getElementById('mo').value = JSON.stringify(res, null, 2);
            document.getElementById('mo').classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', function() {
            var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                height: '100%',
                headerToolbar: { 
                    left: 'prev,next', 
                    center: 'title', 
                    right: 'dayGridMonth,listYear' // 只有日曆與清單
                },
                buttonText: { month: '日曆', list: '清單' },
                // 讓清單模式顯示更寬廣的範圍（顯示一年）
                views: {
                    listYear: { buttonText: '清單', duration: { years: 1 } }
                },
                eventSources: [
                    { url: 'events.json?v=' + Date.now() },
                    { url: 'manual_events.json?v=' + Date.now() }
                ],
                eventClick: function(info) {
                    info.jsEvent.preventDefault();
                    document.getElementById('modal-title').innerText = info.event.extendedProps.description || info.event.title;
                    document.getElementById('modal-link').href = info.event.url || "#";
                    document.getElementById('modal').classList.add('active');
                }
            });
            calendar.render();
        });
    </script>
</body>
</html>
