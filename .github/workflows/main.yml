name: Update Calendar Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write # 重要：允許 GitHub Action 修改你的檔案

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 升級到 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 升級到 v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py --generate-ics

      - name: Commit and push if changed
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add events.json all-events.ics
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新活動資料" && git push)
